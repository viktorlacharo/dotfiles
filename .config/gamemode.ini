[general]
; Reaper checks if a game is still running, interval in ms
reaper_freq=5

; How often gamemode should be active before it decides to start the service
softrealtime=auto

; Inhibit the screensaver/idle while gaming
inhibit_screensaver=1

[gpu]
; Enable GPU optimizations (NVIDIA)
apply_gpu_optimisations=accept-responsibility

; NVIDIA power management mode
; 0: auto, 1: adaptive, 5: max performance
nv_powermizer_mode=1

; GPU clock offset (leave 0 unless you know your card)
nv_core_clock_mhz_offset=0
nv_mem_clock_mhz_offset=0

[cpu]
; Set CPU governor to performance while gaming
governor=performance

; Pin game to performance cores if available (Intel hybrid only)
pin_cores=yes

[filter]
; Whitelist all processes (default behavior)
whitelist=

[custom]
; Commands to run when gamemode starts/ends
; start=notify-send "GameMode" "Activado" -i input-gaming
; end=notify-send "GameMode" "Desactivado" -i input-gaming
