# MangoHud configuration - RTX 5070 optimized
# Toggle overlay: F12 (default)

# --- Layout ---
legacy_layout = false
hud_compact = false
hud_no_margin = false
table_columns = 3
offset_x = 10
offset_y = 10
width = 350

# --- FPS ---
fps
fps_limit = 0
fps_color_change = true
fps_value = 60,90
fps_color = FF4444,FFAA00,00FF00

# --- Frame timing ---
frame_timing = true
frametime

# --- GPU (NVIDIA) ---
gpu_stats
gpu_temp
gpu_core_clock
gpu_mem_clock
gpu_power
gpu_load_change = true
gpu_load_value = 50,90
gpu_load_color = FFFFFF,FFAA00,FF4444

# --- CPU ---
cpu_stats
cpu_temp
cpu_power
cpu_mhz
cpu_load_change = true

# --- RAM / VRAM ---
ram
vram
gpu_mem_used = true

# --- Info ---
engine_version
vulkan_driver
wine
gamemode

# --- Posición: esquina superior izquierda ---
position = top-left

# --- Visual ---
background_alpha = 0.6
font_size = 20
